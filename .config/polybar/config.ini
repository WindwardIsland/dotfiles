;
; My configuration file for polybar, which is a bar that displays on your screen similar to a panel in most desktop
; environments.

[colors]
background = #1E2326
background-alt = #2E383C
foreground = #D3C6AA
primary = #A7C080
secondary = #7FBBB3
alert = #E67E80
disabled = #9DA9A0

[bar/bar1]
width = 100%
height = 27pt
radius = 0
fixed-center = true
bottom = false

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.secondary}

font-0 = "FantasqueSansM Nerd Font:size=12;2"

modules-left = xworkspaces
modules-center = cmus
modules-right = battery wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right

wm-restack = bspwm
override-redirect = false
dock = true

[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = false
enable-click = true
enable-scroll = true
reverse-scroll = true

label-active = %icon%
label-active-background = ${colors.background}
label-active-foreground = ${colors.secondary}
; label-active-underline= ${colors.primary}
label-active-padding = 2

label-occupied = %icon%
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2

label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %icon%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 2

icon-0 = 1;
icon-1 = 2;
icon-2 = 3;󱥁
icon-3 = 4;
icon-4 = 5;󰇄

[module/battery]
type = internal/battery
full-at = 100
low-at = 5
poll-interval = 5
time-format = %H:%M
format-charging = <ramp-capacity> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
format-low = <ramp-capacity> <label-low>
label-charging = 󱐋 %percentage%%
label-discharging = %percentage%%
label-full = FULL 
label-low = %percentage%%

ramp-capacity-0 = " "
ramp-capacity-1 = " "
ramp-capacity-2 = " "
ramp-capacity-3 = " "
ramp-capacity-4 = " "

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected =   %essid% 

[module/date]
type = internal/date
interval = 1

date = %a %b %d %Y %I:%M %p
; date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/cmus]
type = custom/script
exec = bash ~/.config/polybar/scripts/cmus.sh
interval = 1
format-prefix = "  "
format-prefix-foreground = ${colors.secondary}
format = <label>
label = %output%
label-foreground = ${colors.primary}
click-left = "cmus-remote --pause"

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
